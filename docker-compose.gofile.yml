version: '3.8'

services:
  goondvr:
    image: ghcr.io/heapofchaos/goondvr:latest
    container_name: goondvr-gofile
    ports:
      - "8080:8080"
    volumes:
      # Persistent storage for recordings (temporary if delete after upload is enabled)
      - ./videos:/usr/src/app/videos
      # Persistent storage for configuration
      - ./conf:/usr/src/app/conf
    environment:
      # GoFile Configuration
      - GOFILE_ENABLED=true
      - GOFILE_API_TOKEN=${GOFILE_API_TOKEN}
      - GOFILE_FOLDER_ID=${GOFILE_FOLDER_ID:-}
      - GOFILE_DELETE_AFTER_UPLOAD=${GOFILE_DELETE_AFTER_UPLOAD:-true}
      
      # Supabase Configuration
      - SUPABASE_ENABLED=${SUPABASE_ENABLED:-true}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY}
      - SUPABASE_TABLE_NAME=${SUPABASE_TABLE_NAME:-recordings}
      
      # Optional: Admin authentication
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust based on number of channels)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
